<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cintillo – Cierres Starbase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Exo+2:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── TICKER WRAPPER ─────────────────────────────── */
  .ees-ticker {
    width: 100%;
    background: linear-gradient(135deg, #0d1117 0%, #0f1923 100%);
    border: 1px solid rgba(255, 140, 0, 0.25);
    border-radius: 4px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255, 140, 0, 0.08),
      0 4px 24px rgba(0, 0, 0, 0.6),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
    font-family: 'Exo 2', sans-serif;
    position: relative;
  }

  .ees-ticker::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* ── HEADER ─────────────────────────────────────── */
  .ees-ticker__header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    background: linear-gradient(90deg, #ff6a00, #e85d04);
    position: relative;
    overflow: hidden;
  }
  .ees-ticker__header::after {
    content: '';
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 40px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08));
  }

  .ees-ticker__rocket {
    font-size: 16px;
    animation: rocketBob 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes rocketBob {
    0%,100% { transform: translateY(0) rotate(-45deg); }
    50%      { transform: translateY(-3px) rotate(-45deg); }
  }

  .ees-ticker__label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.95);
    text-transform: uppercase;
    line-height: 1;
  }
  .ees-ticker__label span {
    display: block;
    font-size: 7px; font-weight: 400;
    letter-spacing: 0.2em; opacity: 0.8; margin-top: 2px;
  }

  .ees-ticker__dot {
    width: 7px; height: 7px;
    border-radius: 50%; background: #fff;
    margin-left: auto; flex-shrink: 0;
    animation: dotPulse 1.8s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(255,255,255,.5); }
    50%      { opacity:.5; box-shadow:0 0 0 4px rgba(255,255,255,0); }
  }

  /* ── TRACK ──────────────────────────────────────── */
  .ees-ticker__track {
    display: flex; align-items: center;
    height: 40px; padding: 0 12px;
    overflow: hidden; position: relative;
  }
  .ees-ticker__track::before,
  .ees-ticker__track::after {
    content: ''; position: absolute; top: 0; bottom: 0;
    width: 32px; z-index: 2; pointer-events: none;
  }
  .ees-ticker__track::before { left:0; background:linear-gradient(90deg,#0d1117,transparent); }
  .ees-ticker__track::after  { right:0; background:linear-gradient(270deg,#0d1117,transparent); }

  .ees-ticker__scroll {
    display: flex; align-items: center;
    white-space: nowrap;
    animation: scrollTicker 30s linear infinite;
  }
  .ees-ticker__scroll.paused { animation-play-state: paused; }
  @keyframes scrollTicker {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ees-ticker__item {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0 28px;
    font-size: 12.5px; font-weight: 400;
    color: #c8d8e8; letter-spacing: 0.02em;
  }
  .ees-ticker__item strong { font-weight: 600; color: #ffa040; }
  .ees-ticker__sep {
    display: inline-block; width: 4px; height: 4px;
    border-radius: 50%; background: rgba(255,140,0,.45);
    flex-shrink: 0; margin: 0 4px;
  }

  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 3px;
    font-size: 9px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; vertical-align: middle; margin-left: 4px;
  }
  .badge--open   { background:rgba(0,200,100,.15); color:#00d46a; border:1px solid rgba(0,212,106,.3); }
  .badge--closed { background:rgba(255,80,80,.15);  color:#ff5050; border:1px solid rgba(255,80,80,.3); }

  /* ── FOOTER ─────────────────────────────────────── */
  .ees-ticker__footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 14px;
    border-top: 1px solid rgba(255,255,255,0.04);
    background: rgba(0,0,0,0.2);
  }
  .ees-ticker__source {
    font-size: 9px; color: rgba(255,255,255,.25); letter-spacing: .08em;
  }
  .ees-ticker__source a { color:rgba(255,160,64,.5); text-decoration:none; }
  .ees-ticker__ts {
    font-size: 9px; font-family: 'Orbitron', monospace;
    color: rgba(255,255,255,.2); letter-spacing: .06em;
  }

  /* ── STATUS ─────────────────────────────────────── */
  .ees-ticker__status {
    display: flex; align-items: center; gap: 10px;
    padding: 0 20px; height: 40px;
    font-size: 12px; color: rgba(255,255,255,.4); letter-spacing: .06em;
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,160,64,.2);
    border-top-color: #ffa040;
    border-radius: 50%;
    animation: spin .8s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body style="margin:0;background:#0a0a0f;padding:1rem;">

<div class="ees-ticker" id="ticker">
  <div class="ees-ticker__header">
    <span class="ees-ticker__rocket">🚀</span>
    <div class="ees-ticker__label">
      CIERRES EN STARBASE
      <span>Boca Chica · Cameron County · Texas</span>
    </div>
    <div class="ees-ticker__dot" id="dot"></div>
  </div>

  <div class="ees-ticker__track" id="track">
    <div class="ees-ticker__status">
      <div class="spinner"></div>
      <span>Cargando datos de cierres…</span>
    </div>
  </div>

  <div class="ees-ticker__footer">
    <span class="ees-ticker__source">
      Datos: <a href="https://starbase.nerdpg.live" target="_blank">starbase.nerdpg.live</a>
      · Cameron County
    </span>
    <span class="ees-ticker__ts" id="tsDisplay">—</span>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// 🔧 CAMBIA ESTA URL POR LA DE TU PROXY EN RAILWAY
//    Ejemplo: https://starbase-proxy-production.up.railway.app/cierres
// ══════════════════════════════════════════════════
const PROXY_URL = 'https://starbase-proxy.railway.internal';

// ─── Traducción básica ──────────────────────────
const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function fmtDate(s) {
  if (!s) return null;
  const d = new Date(s);
  if (isNaN(d)) return s;
  const hh = d.getHours().toString().padStart(2,'0');
  const mm = d.getMinutes().toString().padStart(2,'0');
  return `${d.getDate()} ${MESES[d.getMonth()]} · ${hh}:${mm} CDT`;
}

function traducir(t) {
  if (!t) return '';
  return t
    .replace(/boca chica beach/gi,  'Playa Boca Chica')
    .replace(/beach/gi,             'playa')
    .replace(/road closure/gi,      'cierre de carretera')
    .replace(/road/gi,              'carretera')
    .replace(/closure/gi,           'cierre')
    .replace(/state highway\s*/gi,  'Carr. Estatal ')
    .replace(/highway/gi,           'carretera')
    .replace(/production/gi,        'producción')
    .replace(/\bto\b/gi,            'a')
    .replace(/\bfrom\b/gi,          'desde')
    .replace(/entrance/gi,          'entrada')
    .replace(/access/gi,            'acceso')
    .replace(/no delays?/gi,        'sin demoras')
    .replace(/no public notices?/gi,'sin avisos públicos')
    .replace(/delay/gi,             'demora')
    .replace(/masseys/gi,           'Massey');
}

// ─── Render ─────────────────────────────────────
async function cargarCierres() {
  const track = document.getElementById('track');
  const ts    = document.getElementById('tsDisplay');
  const dot   = document.getElementById('dot');

  try {
    const res  = await fetch(PROXY_URL);
    const data = await res.json();
    const raw  = Array.isArray(data) ? data : (data.closures || data.data || []);

    const items = raw.length === 0
      ? [{ texto: '✅  Sin cierres activos — Carretera y playa Boca Chica abiertas', open: true }]
      : raw.map(c => {
          const desc  = traducir(c.description || c.desc || c.title || 'Cierre programado');
          const start = fmtDate(c.startDate || c.start || c.date_start);
          const end   = fmtDate(c.endDate   || c.end   || c.date_end);
          const rango = [start, end].filter(Boolean).join(' — ');
          return { texto: desc + (rango ? `  ·  ${rango}` : ''), open: false };
        });

    const sep  = `<span class="ees-ticker__sep"></span>`;
    const html = (arr) => arr.map(i => `
      <span class="ees-ticker__item">
        <strong>${i.texto}</strong>
        <span class="badge ${i.open ? 'badge--open' : 'badge--closed'}">
          ${i.open ? 'ABIERTO' : 'CERRADO'}
        </span>
      </span>${sep}`).join('');

    // Duplicate for seamless infinite scroll
    track.innerHTML = `<div class="ees-ticker__scroll" id="scroll">${html(items)+html(items)}</div>`;

    const scroll = document.getElementById('scroll');
    scroll.style.animationDuration = Math.max(20, items.length * 14) + 's';

    track.addEventListener('mouseenter', () => scroll.classList.add('paused'));
    track.addEventListener('mouseleave', () => scroll.classList.remove('paused'));

    const now = new Date();
    ts.textContent = `ACT. ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

  } catch (err) {
    console.error(err);
    dot.style.background = '#ff5050';
    track.innerHTML = `<div class="ees-ticker__status">⚠ No se pudieron cargar los datos.</div>`;
  }
}

cargarCierres();
setInterval(cargarCierres, 5 * 60 * 1000); // refresca cada 5 min
</script>

</body>
</html>
