<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cintillo – Cierres Starbase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Exo+2:wght@300;400;500;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }

  .ees-ticker {
    width:100%;
    background: linear-gradient(135deg, #0d1117 0%, #0f1923 100%);
    border: 1px solid rgba(255,140,0,0.25);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,140,0,0.08), 0 4px 24px rgba(0,0,0,0.6);
    font-family: 'Exo 2', sans-serif;
    position: relative;
  }
  .ees-ticker::before {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:10;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
  }

  /* HEADER */
  .ees-header {
    display:flex; align-items:center; gap:10px; padding:7px 14px;
    background: linear-gradient(90deg, #c8102e, #a00d24);
  }
  .ees-rocket { font-size:16px; flex-shrink:0; animation:bob 2s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-45deg)} 50%{transform:translateY(-3px) rotate(-45deg)} }
  .ees-label {
    font-family:'Orbitron',monospace; font-size:9px; font-weight:700;
    letter-spacing:.18em; color:rgba(255,255,255,.95); text-transform:uppercase; line-height:1;
  }
  .ees-label span { display:block; font-size:7px; font-weight:400; letter-spacing:.2em; opacity:.8; margin-top:2px; }
  .ees-dot {
    width:7px; height:7px; border-radius:50%; background:#fff;
    margin-left:auto; flex-shrink:0; animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,255,255,.5)} 50%{opacity:.5;box-shadow:0 0 0 4px rgba(255,255,255,0)} }

  /* STATUS PILLS */
  .ees-pills {
    display:flex; gap:6px; padding:7px 14px;
    border-bottom:1px solid rgba(255,255,255,.06);
    background:rgba(0,0,0,.15); flex-wrap:wrap; align-items:center;
  }
  .pill {
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:20px;
    font-size:10px; font-weight:600; letter-spacing:.05em;
    border:1px solid; white-space:nowrap;
  }
  .pill__dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .pill--open   { color:#00d46a; border-color:rgba(0,212,106,.3);  background:rgba(0,200,100,.1); }
  .pill--open   .pill__dot { background:#00d46a; animation:pulse 1.8s ease-in-out infinite; }
  .pill--closed { color:#ff5050; border-color:rgba(255,80,80,.3);   background:rgba(255,80,80,.1); }
  .pill--closed .pill__dot { background:#ff5050; animation:pulse 1.8s ease-in-out infinite; }
  .pill--warn   { color:#ffa040; border-color:rgba(255,160,64,.3);  background:rgba(255,160,64,.1); }
  .pill--warn   .pill__dot { background:#ffa040; animation:pulse 1.8s ease-in-out infinite; }
  .pill--dim    { color:rgba(255,255,255,.3); border-color:rgba(255,255,255,.08); background:transparent; }

  /* TABS */
  .ees-tabs { display:flex; border-bottom:1px solid rgba(255,255,255,.06); }
  .ees-tab {
    flex:1; padding:6px 10px; text-align:center;
    font-family:'Orbitron',monospace; font-size:7.5px; font-weight:600;
    letter-spacing:.12em; text-transform:uppercase; cursor:pointer;
    color:rgba(255,255,255,.3); border:none; background:transparent;
    border-bottom:2px solid transparent; transition:all .2s;
  }
  .ees-tab.active   { color:#ffa040; border-bottom-color:#ffa040; background:rgba(255,160,64,.05); }
  .ees-tab:hover:not(.active) { color:rgba(255,255,255,.6); }

  /* TRACK */
  .ees-track {
    display:flex; align-items:center; height:42px; padding:0 12px;
    overflow:hidden; position:relative;
  }
  .ees-track::before,.ees-track::after {
    content:''; position:absolute; top:0; bottom:0; width:32px; z-index:2; pointer-events:none;
  }
  .ees-track::before { left:0;  background:linear-gradient(90deg,#0d1117,transparent); }
  .ees-track::after  { right:0; background:linear-gradient(270deg,#0d1117,transparent); }

  .ees-scroll {
    display:flex; align-items:center; white-space:nowrap;
    animation:scrollTicker 30s linear infinite;
  }
  .ees-scroll.paused { animation-play-state:paused; }
  @keyframes scrollTicker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  .ees-item {
    display:inline-flex; align-items:center; gap:8px; padding:0 24px;
    font-size:12.5px; font-weight:400; color:#c8d8e8; letter-spacing:.02em;
  }
  .ees-item strong { font-weight:600; color:#ffa040; }
  .ees-item .fecha { color:rgba(255,255,255,.4); font-size:11px; }
  .ees-sep { display:inline-block; width:4px; height:4px; border-radius:50%; background:rgba(255,140,0,.4); margin:0 4px; flex-shrink:0; }

  .badge {
    display:inline-block; padding:2px 7px; border-radius:3px;
    font-size:9px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; vertical-align:middle; margin-left:4px; flex-shrink:0;
  }
  .badge--open     { background:rgba(0,200,100,.15);  color:#00d46a; border:1px solid rgba(0,212,106,.3); }
  .badge--closed   { background:rgba(255,80,80,.15);   color:#ff5050; border:1px solid rgba(255,80,80,.3); }
  .badge--upcoming { background:rgba(255,160,64,.15);  color:#ffa040; border:1px solid rgba(255,160,64,.3); }

  /* FOOTER */
  .ees-footer {
    display:flex; align-items:center; justify-content:space-between;
    padding:5px 14px; border-top:1px solid rgba(255,255,255,.04); background:rgba(0,0,0,.2);
  }
  .ees-source { font-size:9px; color:rgba(255,255,255,.25); letter-spacing:.08em; }
  .ees-source a { color:rgba(255,160,64,.5); text-decoration:none; }
  .ees-ts { font-size:9px; font-family:'Orbitron',monospace; color:rgba(255,255,255,.2); letter-spacing:.06em; }

  /* LOADING */
  .ees-loading {
    display:flex; align-items:center; gap:10px;
    padding:0 20px; height:42px; font-size:12px; color:rgba(255,255,255,.4);
  }
  .spinner {
    width:14px; height:14px; border:2px solid rgba(255,160,64,.2);
    border-top-color:#ffa040; border-radius:50%; animation:spin .8s linear infinite; flex-shrink:0;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body style="margin:0;padding:1rem;background:#0a0a0f;">

<div class="ees-ticker">
  <div class="ees-header">
    <span class="ees-rocket">🚀</span>
    <div class="ees-label">CIERRES EN STARBASE<span>Boca Chica · Cameron County · Texas</span></div>
    <div class="ees-dot"></div>
  </div>

  <div class="ees-pills" id="pills">
    <span class="pill pill--dim"><span class="pill__dot" style="background:rgba(255,255,255,.2)"></span>Cargando estado…</span>
  </div>

  <div class="ees-tabs">
    <button class="ees-tab active" id="tab-hoy"      onclick="switchTab('hoy')">⚡ Hoy</button>
    <button class="ees-tab"        id="tab-proximos" onclick="switchTab('proximos')">📅 Próximos</button>
  </div>

  <div class="ees-track" id="track">
    <div class="ees-loading"><div class="spinner"></div><span>Cargando…</span></div>
  </div>

  <div class="ees-footer">
    <span class="ees-source">
      <a href="https://www.starbase.texas.gov/beach-road-access" target="_blank">starbase.texas.gov</a>
      &nbsp;·&nbsp;
      <a href="https://starbase.nerdpg.live" target="_blank">starbase.nerdpg.live</a>
    </span>
    <span class="ees-ts" id="tsDisplay">—</span>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// 🔧 CAMBIA POR TU URL DE RAILWAY
// ══════════════════════════════════════════════════
const BASE = 'https://TU-PROXY.up.railway.app';

const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function fmtDate(s) {
  if (!s) return null;
  const d = new Date(s);
  if (isNaN(d)) return s;
  return `${d.getDate()} ${MESES[d.getMonth()]} · ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')} CDT`;
}

function traducir(t) {
  if (!t) return '';
  return t
    .replace(/boca chica beach/gi,    'Playa Boca Chica')
    .replace(/beach is open\.?/gi,    'playa abierta')
    .replace(/beach/gi,               'playa')
    .replace(/road closure/gi,        'cierre de carretera')
    .replace(/no road delay\.?/gi,    'Sin demoras en carretera')
    .replace(/road delay/gi,          'demora en carretera')
    .replace(/road/gi,                'carretera')
    .replace(/closure/gi,             'cierre')
    .replace(/state highway\s*/gi,    'Carr. Estatal ')
    .replace(/highway/gi,             'carretera')
    .replace(/production/gi,          'producción')
    .replace(/\bto\b/gi,              'a')
    .replace(/\bfrom\b/gi,            'desde')
    .replace(/entrance/gi,            'entrada')
    .replace(/access/gi,              'acceso')
    .replace(/no delays?\.?/gi,       'sin demoras')
    .replace(/no public notices?[^.]*/gi, 'sin avisos públicos')
    .replace(/delay/gi,               'demora')
    .replace(/masseys/gi,             'Massey')
    .replace(/is open\.?/gi,          'abierta');
}

// ── Status pills (solo playa + carretera) ────────
async function cargarEstado() {
  try {
    const res  = await fetch(BASE + '/estado');
    const data = await res.json();

    console.log('Estado recibido:', data); // debug en consola del browser

    const beachRaw = (data.beach || '').trim();
    const roadRaw  = (data.road  || '').trim();
    const beachLo  = beachRaw.toLowerCase();
    const roadLo   = roadRaw.toLowerCase();

    const beachOpen = beachLo.includes('open') || beachLo.includes('abierta') || beachLo.includes('abierto');
    const roadOk    = roadLo.includes('no road delay') || roadLo.includes('no delay') || roadLo.includes('sin demora');

    // Texto de la carretera: si hay demora, mostrarla traducida; si no, mensaje limpio
    const roadLabel = roadOk
      ? 'Sin demoras'
      : (traducir(roadRaw) || 'Demora activa');

    document.getElementById('pills').innerHTML = `
      <span class="pill ${beachOpen ? 'pill--open' : 'pill--closed'}">
        <span class="pill__dot"></span>
        🏖 Playa: ${beachOpen ? 'Abierta' : 'Cerrada'}
      </span>
      <span class="pill ${roadOk ? 'pill--open' : 'pill--warn'}">
        <span class="pill__dot"></span>
        🛣 Carretera: ${roadLabel}
      </span>
    `;
  } catch(e) {
    console.error('Error cargando estado:', e);
    document.getElementById('pills').innerHTML =
      `<span class="pill pill--dim"><span class="pill__dot" style="background:rgba(255,255,255,.2)"></span>Estado no disponible</span>`;
  }
}

// ── Ticker scrolling ─────────────────────────────
let tabActual = 'hoy';
let cacheHoy  = null;
let cacheProx = null;

function renderItems(items, esProximo) {
  const track = document.getElementById('track');
  if (!items || items.length === 0) {
    items = [{ texto: esProximo ? '📅 Sin cierres programados próximamente' : '✅ Sin cierres activos hoy — carretera y playa abiertas', badge:'open' }];
  }
  const sep  = `<span class="ees-sep"></span>`;
  const html = (arr) => arr.map(i => `
    <span class="ees-item">
      <strong>${i.texto}</strong>
      ${i.fecha ? `<span class="fecha">${i.fecha}</span>` : ''}
      <span class="badge badge--${i.badge}">${i.badge==='open'?'ABIERTO':i.badge==='closed'?'CERRADO':'PROGRAMADO'}</span>
    </span>${sep}`).join('');
  track.innerHTML = `<div class="ees-scroll" id="scroll">${html(items)+html(items)}</div>`;
  const scroll = document.getElementById('scroll');
  scroll.style.animationDuration = Math.max(20, items.length * 14) + 's';
  track.addEventListener('mouseenter', () => scroll.classList.add('paused'));
  track.addEventListener('mouseleave', () => scroll.classList.remove('paused'));
}

async function cargarHoy() {
  if (cacheHoy) return renderItems(cacheHoy, false);
  try {
    const res  = await fetch(BASE + '/cierres/hoy');
    const data = await res.json();
    const raw  = Array.isArray(data) ? data : (data.closures || data.data || []);
    cacheHoy = raw.map(c => ({
      texto: traducir(c.description || c.desc || c.title || 'Cierre'),
      badge: 'closed'
    }));
    renderItems(cacheHoy, false);
  } catch(e) { renderItems([], false); }
}

async function cargarProximos() {
  if (cacheProx) return renderItems(cacheProx, true);
  try {
    const res  = await fetch(BASE + '/cierres');
    const data = await res.json();
    const raw  = Array.isArray(data) ? data : (data.closures || data.data || []);
    const ahora = Date.now();
    const fut = raw.filter(c => new Date(c.startDate||c.start||c.date_start||0) > ahora);
    cacheProx = fut.slice(0,10).map(c => ({
      texto: traducir(c.description||c.desc||c.title||'Cierre programado'),
      fecha: [fmtDate(c.startDate||c.start||c.date_start), fmtDate(c.endDate||c.end||c.date_end)].filter(Boolean).join(' — ') || null,
      badge: 'upcoming'
    }));
    renderItems(cacheProx, true);
  } catch(e) { renderItems([], true); }
}

function switchTab(tab) {
  tabActual = tab;
  document.getElementById('tab-hoy').classList.toggle('active',      tab==='hoy');
  document.getElementById('tab-proximos').classList.toggle('active', tab==='proximos');
  document.getElementById('track').innerHTML =
    `<div class="ees-loading"><div class="spinner"></div><span>Cargando…</span></div>`;
  if (tab==='hoy') cargarHoy(); else cargarProximos();
}

function actualizarTs() {
  const n = new Date();
  document.getElementById('tsDisplay').textContent =
    `ACT. ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
}

cargarEstado();
cargarHoy();
actualizarTs();
setInterval(() => {
  cacheHoy = null; cacheProx = null;
  cargarEstado(); switchTab(tabActual); actualizarTs();
}, 5 * 60 * 1000);
</script>
</body>
</html>
